name: PyPI Publish

on:
  release:
    types: [published]

permissions:
  contents: write  # Crucial: allows pushing the commit back to the repo
  id-token: write  # Required for Trusted Publishing to PyPI

jobs:
  build-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Fetch all history so we can push back to the branch
          fetch-depth: 0
          ref: ${{ github.event.release.target_commitish }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate pyproject.toml
        run: |
          # 1. Fetch Repository Metadata
          REPO_INFO=$(gh repo view ${{ github.repository }} --json name,description,url --jq '.')
          PACKAGE_NAME=$(echo "$REPO_INFO" | jq -r '.name')
          DESCRIPTION=$(echo "$REPO_INFO" | jq -r '.description')
          REPO_URL=$(echo "$REPO_INFO" | jq -r '.url')
          
          # 2. Get Version from Release Tag (e.g., 1.2.3)
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          
          # 3. Get Author
          AUTHOR_NAME="${{ github.actor }}"
          
          # 4. Process requirements.txt into a JSON list
          if [ -f "requirements.txt" ]; then
            DEPENDENCIES=$(python3 -c "import json; print(json.dumps([line.strip() for line in open('requirements.txt') if line.strip() and not line.startswith('#')]))")
          else
            DEPENDENCIES="[]"
          fi

          # 5. Build the pyproject.toml
          cat <<EOF > pyproject.toml
          [build-system]
          requires = ["setuptools>=61.0", "wheel"]
          build-backend = "setuptools.build_meta"

          [project]
          name = "$PACKAGE_NAME"
          version = "$VERSION"
          description = "$DESCRIPTION"
          readme = "README.md"
          requires-python = ">=3.8"
          authors = [
            { name = "$AUTHOR_NAME", email = "$AUTHOR_NAME@users.noreply.github.com" }
          ]
          dependencies = $DEPENDENCIES

          [project.urls]
          "Homepage" = "$REPO_URL"
          "Bug Tracker" = "$REPO_URL/issues"

          [tool.setuptools.packages.find]
          where = ["src"]
          EOF
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit pyproject.toml back to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add pyproject.toml
          
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to pyproject.toml. Skipping commit."
          else
            git commit -m "chore: auto-generate pyproject.toml for version ${{ github.event.release.tag_name }}"
            git push origin HEAD:${{ github.event.release.target_commitish }}
          fi

      - name: Build Package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/